<style>
  :root {
    --bg: #050608;
    --grid-line: rgba(170, 180, 200, 0.035);
    --pink: #ff5a8a;
    --pink-deep: #ff2f6e;
    --cyan: #2dd4ff;
    --blue: #2cb0e2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: #fff;
    overflow: hidden;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  /* static grid (no mouse deformation) */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 56px 56px;
    background-position: -1px -1px;
  }

  /* large, soft pink wash that simulates the ears illuminating the grid */
  .ear-wash {
    position: fixed;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(60vw 70vh at 18vw 95vh,
        rgba(255, 90, 138, 0.35) 0%,
        rgba(255, 90, 138, 0.24) 18%,
        rgba(255, 90, 138, 0.14) 35%,
        rgba(255, 90, 138, 0.06) 55%,
        rgba(255, 90, 138, 0.02) 75%,
        transparent 100%);
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen;
    animation: washPulse 10s ease-in-out infinite;
  }

  /* canvas overlay that brightens grid lines around the cursor (no deformation) */
  #cursor-glow {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  @keyframes washPulse {
    0%, 100% { opacity: 0.70; }
    50%      { opacity: 1.00; }
  }

  /* lorem ipsum top-left */
  .lorem {
    position: absolute;
    top: 14px;
    left: 18px;
    max-width: 720px;
    font-family: "Times New Roman", Times, serif;
    font-size: 11.5px;
    line-height: 1.35;
    color: #e7e7ea;
    z-index: 6;
    letter-spacing: 0.01em;
  }

  /* social icons */
  .socials {
    position: absolute;
    top: 28px;
    right: 120px;
    display: flex;
    gap: 14px;
    z-index: 6;
  }
  .socials a {
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: transform .2s ease;
  }
  .socials a:hover { transform: translateY(-2px); }

  /* blue accent box on the right edge */
  .blue-box {
    position: absolute;
    top: 0;
    right: 0;
    width: 70px;
    height: 270px;
    background: var(--blue);
    z-index: 6;
  }

  /* center logo */
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    z-index: 5;
    text-align: center;
    pointer-events: none;
    user-select: none;
    width: min(1100px, 78vw);
  }

  .logo-img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* cat ears — bottom LEFT */
  .ears {
    position: fixed;
    left: -3vw;
    bottom: -3vh;
    width: min(720px, 56vw);
    z-index: 4;
    pointer-events: none;
    animation: earsFlicker 60s ease-in-out infinite;
  }

  .ears svg { width: 100%; height: auto; display: block; overflow: visible; }
  .ears .ear-stroke {
    fill: none;
    stroke: var(--pink);
    stroke-width: 5;
    stroke-miterlimit: 10;
    stroke-linejoin: round;
  }

  @keyframes earsFlicker {
    0%, 100% {
      filter:
        drop-shadow(0 0 2px rgba(255, 90, 138, 0.40))
        drop-shadow(0 0 14px rgba(255, 90, 138, 0.28))
        drop-shadow(0 0 36px rgba(255, 90, 138, 0.18))
        drop-shadow(0 0 40px rgba(255, 90, 138, 0.10));
    }
    50% {
      filter:
        drop-shadow(0 0 3px rgba(255, 90, 138, 0.55))
        drop-shadow(0 0 20px rgba(255, 90, 138, 0.40))
        drop-shadow(0 0 25px rgba(255, 90, 138, 0.14))
    }
  }

  @media (max-width: 720px) {
    .socials { right: 90px; gap: 10px; }
    .socials a { width: 38px; height: 38px; }
    .blue-box { width: 50px; height: 200px; }
    .lorem { font-size: 10px; max-width: 60vw; }
    .center { width: 86vw; }
    .ears { width: 78vw; }
  }
</style>

<script>
(() => {
  const canvas = document.getElementById('cursor-glow');
  const ctx = canvas.getContext('2d');

  const SPACING = 56;        // matches CSS background-size
  const RADIUS  = 520;       // larger area, very diffuse
  const LINE_ALPHA = 0.22;   // gentle line tint
  const HALO_ALPHA = 0.32;   // soft halo at the core

  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = 0, H = 0;
  let mouseX = -99999, mouseY = -99999;
  let smX = -99999, smY = -99999;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (smX < -1000) { smX = mouseX; smY = mouseY; }
  });
  window.addEventListener('mouseleave', () => {
    mouseX = -99999;
    mouseY = -99999;
  });

  resize();

  function draw() {
    if (mouseX > -1000) {
      smX += (mouseX - smX) * 0.14;
      smY += (mouseY - smY) * 0.14;
    } else {
      smX = -99999;
      smY = -99999;
    }

    ctx.clearRect(0, 0, W, H);

    if (smX > -1000) {
      // very soft halo
      const halo = ctx.createRadialGradient(smX, smY, 0, smX, smY, RADIUS);
      halo.addColorStop(0,    `rgba(255, 90, 138, ${HALO_ALPHA})`);
      halo.addColorStop(0.30, `rgba(255, 90, 138, ${HALO_ALPHA * 0.45})`);
      halo.addColorStop(0.65, `rgba(255, 90, 138, ${HALO_ALPHA * 0.15})`);
      halo.addColorStop(1,    'rgba(255, 90, 138, 0)');
      ctx.fillStyle = halo;
      ctx.fillRect(smX - RADIUS, smY - RADIUS, RADIUS * 2, RADIUS * 2);

      // subtle line tint, masked with a long, gentle radial fade
      ctx.save();
      ctx.strokeStyle = `rgba(255, 90, 138, ${LINE_ALPHA})`;
      ctx.lineWidth = 1;

      const minX = Math.floor((smX - RADIUS) / SPACING) * SPACING;
      const maxX = Math.ceil((smX + RADIUS) / SPACING) * SPACING;
      const minY = Math.floor((smY - RADIUS) / SPACING) * SPACING;
      const maxY = Math.ceil((smY + RADIUS) / SPACING) * SPACING;

      ctx.beginPath();
      for (let x = minX; x <= maxX; x += SPACING) {
        ctx.moveTo(x + 0.5, smY - RADIUS);
        ctx.lineTo(x + 0.5, smY + RADIUS);
      }
      for (let y = minY; y <= maxY; y += SPACING) {
        ctx.moveTo(smX - RADIUS, y + 0.5);
        ctx.lineTo(smX + RADIUS, y + 0.5);
      }
      ctx.stroke();

      ctx.globalCompositeOperation = 'destination-in';
      const mask = ctx.createRadialGradient(smX, smY, 0, smX, smY, RADIUS);
      mask.addColorStop(0,    'rgba(0,0,0,1)');
      mask.addColorStop(0.30, 'rgba(0,0,0,0.55)');
      mask.addColorStop(0.65, 'rgba(0,0,0,0.20)');
      mask.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = mask;
      ctx.fillRect(smX - RADIUS, smY - RADIUS, RADIUS * 2, RADIUS * 2);

      ctx.restore();
    }

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
